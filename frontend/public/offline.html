<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06060A" />
  <title>MATKA 11 — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #06060A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }
    .blur-a, .blur-b {
      position: absolute;
      width: 420px; height: 420px;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .blur-a { top: -120px; left: -100px; background: rgba(212,175,55,0.20); }
    .blur-b { bottom: -120px; right: -100px; background: rgba(16,185,129,0.16); }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      text-align: center;
      padding: 36px 28px;
      background: rgba(15,15,20,0.95);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo-wrap {
      width: 96px; height: 96px;
      margin: 0 auto 18px;
      border-radius: 24px;
      background: linear-gradient(145deg, #FDE047, #D4AF37);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 32px rgba(212,175,55,0.45);
      position: relative;
    }
    .logo-wrap::after {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 28px;
      background: rgba(212,175,55,0.35);
      filter: blur(20px);
      z-index: -1;
    }
    .logo-text { color: #06060A; font-size: 38px; font-weight: 900; letter-spacing: -1px; }

    .icon-cloud {
      position: relative;
      margin: 0 auto 16px;
      width: 72px; height: 72px;
      border-radius: 50%;
      background: rgba(212,175,55,0.10);
      border: 1px solid rgba(212,175,55,0.30);
      display: flex; align-items: center; justify-content: center;
    }
    .icon-cloud svg { width: 36px; height: 36px; color: #D4AF37; }
    .ping {
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(212,175,55,0.45);
      animation: ping 1.8s cubic-bezier(0,0,0.2,1) infinite;
    }
    @keyframes ping {
      0% { transform: scale(0.95); opacity: 0.85; }
      75%, 100% { transform: scale(1.4); opacity: 0; }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #FDE047, #D4AF37, #FDE047);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p.sub { color: #9CA3AF; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }

    .tip {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 22px;
      text-align: left;
    }
    .tip p { color: #d1d5db; font-size: 12.5px; line-height: 1.55; }
    .tip strong { color: #FDE047; }

    button {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      color: #06060A;
      background: linear-gradient(90deg, #D4AF37, #FDE047, #D4AF37);
      box-shadow: 0 10px 26px rgba(212,175,55,0.40);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      letter-spacing: 0.2px;
    }
    button:active { transform: translateY(1px); box-shadow: 0 6px 18px rgba(212,175,55,0.35); }
    button .arrow { display: inline-block; transition: transform 0.2s; margin-left: 6px; }
    button:hover .arrow { transform: translateX(3px); }

    .small {
      margin-top: 14px;
      color: #6b7280;
      font-size: 11px;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ef4444;
      margin-right: 6px;
      animation: pulse-dot 1.6s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="blur-a"></div>
  <div class="blur-b"></div>

  <div class="card">
    <div class="logo-wrap">
      <span class="logo-text">M</span>
    </div>

    <div class="icon-cloud">
      <span class="ping"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="2" x2="22" y2="22"></line>
        <path d="M8.5 16.5a5 5 0 0 1 7-7"></path>
        <path d="M2 8.82a15 15 0 0 1 4.17-2.65"></path>
        <path d="M10.66 5c4.01-.36 8.14.9 11.34 3.76"></path>
        <path d="M16.85 11.25a10 10 0 0 1 2.22 1.68"></path>
        <path d="M5 12.55a10 10 0 0 1 5.17-2.39"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>

    <h1>नेटवर्क उपलब्ध नहीं है</h1>
    <p class="sub">
      <span class="status-dot"></span>आप अभी ऑफलाइन हैं
    </p>

    <div class="tip">
      <p><strong>क्या करें?</strong><br/>• Wi-Fi या मोबाइल डेटा चालू करें<br/>• Airplane mode बंद करें<br/>• कुछ सेकंड बाद फिर try करें</p>
    </div>

    <button onclick="retry()" id="retry-btn">
      फिर से कोशिश करें <span class="arrow">→</span>
    </button>

    <p class="small">MATKA 11 · India's most trusted Matka platform</p>
  </div>

  <script>
    function retry() {
      var btn = document.getElementById('retry-btn');
      btn.innerHTML = 'Connect हो रहा है...';
      btn.disabled = true;
      setTimeout(function(){ window.location.reload(); }, 400);
    }
    window.addEventListener('online', function(){
      window.location.reload();
    });
  </script>
</body>
</html>
