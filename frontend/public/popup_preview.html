<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Popup Preview</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&display=swap');
@keyframes popupEnter {
  0% { transform: scale(0.7) translateY(40px); opacity: 0; }
  60% { transform: scale(1.05) translateY(-5px); opacity: 1; }
  100% { transform: scale(1) translateY(0); opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
</style>
</head>
<body class="bg-[#0A0A0C]">

<!-- Simulated dashboard in background (blurry feel) -->
<div style="filter: blur(3px); opacity: 0.6;">
<div class="fixed top-0 left-0 right-0 bg-[#0A0A0C] border-b border-white/10 p-3" style="max-width: 480px; margin: 0 auto;">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-[#141418] border border-white/10"></div>
      <div class="flex items-baseline gap-1">
        <span class="text-xl font-black text-[#D4AF37]" style="font-family: Unbounded">MATKA</span>
        <span class="text-2xl font-black text-white" style="font-family: Unbounded">11</span>
      </div>
    </div>
    <button class="px-3 py-1.5 rounded-lg bg-gradient-to-r from-[#D4AF37] to-[#FDE047] text-black font-bold text-xs">Download App</button>
  </div>
</div>
<div class="pt-20 px-3 max-w-[480px] mx-auto">
  <div class="rounded-xl bg-gradient-to-r from-[#1a1a2e] via-[#16213e] to-[#0f3460] border border-[#D4AF37]/30 p-3 mb-2">
    <div class="flex items-center justify-between">
      <div>
        <p class="text-[#D4AF37] font-black text-base">Refer करके पैसे कमाएं</p>
        <p class="text-gray-300 text-xs">दोस्तों को भेजें, हर रेफर पर बोनस पाएं</p>
      </div>
    </div>
  </div>
  <div class="rounded-xl bg-gradient-to-br from-[#D4AF37]/10 to-[#141418] border border-[#D4AF37]/20 p-4 mb-3">
    <p class="text-gray-400 text-xs">Your Balance</p>
    <p class="text-white text-3xl font-black">₹1,250</p>
  </div>
  <div class="grid grid-cols-2 gap-3">
    <div class="h-24 bg-[#141418] rounded-xl border border-white/10"></div>
    <div class="h-24 bg-[#141418] rounded-xl border border-white/10"></div>
  </div>
</div>
</div>

<!-- Popup Modal -->
<div class="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
  <div
    class="relative w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl"
    style="background: linear-gradient(135deg, #1a1410 0%, #241a12 50%, #1a1410 100%); border: 2px solid #D4AF37; animation: popupEnter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);"
  >
    <!-- Glow gradient top -->
    <div class="absolute inset-x-0 top-0 h-32 pointer-events-none" style="background: linear-gradient(to bottom, rgba(212,175,55,0.30), transparent);"></div>

    <!-- Close button -->
    <button class="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/40 text-white flex items-center justify-center z-10">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>

    <div class="relative p-6 text-center">
      <!-- Sparkle icons -->
      <div class="flex justify-center gap-2 mb-3 items-center">
        <svg class="w-4 h-4 text-[#D4AF37] pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.5 7.5H22l-6 4.5 2 7.5-6-4.5-6 4.5 2-7.5-6-4.5h7.5z"/></svg>
        <svg class="w-8 h-8 text-[#D4AF37]" style="filter: drop-shadow(0 0 12px rgba(212,175,55,0.6));" fill="currentColor" viewBox="0 0 24 24">
          <path d="M7 4h10v2h3v4c0 2.21-1.79 4-4 4h-.5c-.56 1.28-1.65 2.25-3 2.75V19h3v2H8v-2h3v-2.25c-1.35-.5-2.44-1.47-3-2.75H7c-2.21 0-4-1.79-4-4V6h4V4zm0 4H5v2c0 1.1.9 2 2 2V8zm10 0v4c1.1 0 2-.9 2-2V8h-2z"/>
        </svg>
        <svg class="w-4 h-4 text-[#D4AF37] pulse" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.5 7.5H22l-6 4.5 2 7.5-6-4.5-6 4.5 2-7.5-6-4.5h7.5z"/></svg>
      </div>

      <p class="text-[#D4AF37] text-xs font-bold uppercase tracking-widest mb-1">
        गजब रिजल्ट खुल गया!
      </p>
      <h2 class="text-white text-2xl font-black mb-4 tracking-tight" style="font-family: system-ui">
        Ghaziabad
      </h2>

      <!-- Jodi display -->
      <div class="inline-block mb-2">
        <div
          class="px-10 py-4 rounded-2xl font-black text-5xl text-black tracking-wider"
          style="background: linear-gradient(135deg, #FDE047 0%, #D4AF37 50%, #B8941E 100%); box-shadow: 0 0 40px rgba(212,175,55,0.4), inset 0 1px 0 rgba(255,255,255,0.3); font-family: Unbounded, sans-serif;"
        >
          34
        </div>
      </div>

      <p class="text-gray-400 text-xs mt-3">
        सिंगल: <span class="text-[#D4AF37] font-bold">7</span>
      </p>

      <p class="text-gray-500 text-[10px] mt-4">
        10s में ऑटो-बंद होगा
      </p>
    </div>
  </div>
</div>

</body>
</html>
